namespace: thalamus

operator:
  enabled: true
  replicas: 1
  image:
    registry: ghcr.io
    repository: cobaltcore-dev/thalamus
    tag: ""  # defaults to chart appVersion
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 128Mi
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    privileged: false
    capabilities:
      drop: [ALL]
  livenessProbe:
    httpGet:
      path: /healthz
      port: health
    initialDelaySeconds: 15
    periodSeconds: 20
  readinessProbe:
    httpGet:
      path: /readyz
      port: health
    initialDelaySeconds: 5
    periodSeconds: 10
  metrics:
    enabled: false
  serviceAccount:
    create: true
    name: ""
  rbac:
    create: true

owner_info:
  support_group: workload-management
  service: thalamus

gateway:
  name: inference-gateway
  listeners:
    - port: 80
      protocol: HTTP
      name: default
      allowedRoutes:
        namespaces:
          from: All

  parameters:
    service:
      spec:
        type: ClusterIP
        # type: LoadBalancer
        # loadBalancerIP: ""

  # Set to true to enable API key authentication.
  # Secrets must be labelled `thalamus-apikey: "true"`.
  apiKeyAuth: false

  policies:
    bbr:
      # enabled: false
      traffic:
        phase: PreRouting
        transformation:
          request:
            set:
              - name: X-Gateway-Base-Model-Name
                value: json(request.body).model

# Accelerator profiles
accelerators:
  cpu:
    image: vllm/vllm-openai-cpu:v0.23.0
    baseArgs: []
    baseEnv: []
    securityContext:
      seccompProfile:
        type: Unconfined
      capabilities:
        add:
          - SYS_NICE
  nvidia:
    image: vllm/vllm-openai:v0.23.0
    baseArgs:
      - "--gpu-memory-utilization=0.95"
    baseEnv:
      - name: NCCL_P2P_LEVEL
        value: "PIX"
      - name: NCCL_IB_DISABLE
        value: "1"
    securityContext: {}

# List of models to deploy. Each entry produces a model Deployment, Service, and InferencePool.
# Example:
# models:
#   - slug: my-model
#     model: org/my-model
#     accelerator: nvidia
#     replicas: 1
#     extraArgs: []
#     extraEnv: []
#     resources:
#       requests:
#         nvidia.com/gpu: "1"
#       limits:
#         nvidia.com/gpu: "1"
models: []

# Endpoint Picker (EPP)
epp:
  image: ghcr.io/llm-d/llm-d-inference-scheduler:v0.8.0
  resources:
    requests:
      cpu: "1"
      memory: 1Gi
    limits:
      memory: 2Gi

# Frontend
open-webui:
  enabled: true
  ollama:
    enabled: false
  pipelines:
    enabled: false
  tika:
    enabled: false
  terminals:
    enabled: false
  extraEnvVars:
    - name: WEBUI_AUTH
      value: "False"
  service:
    type: ClusterIP
  openaiBaseApiUrl: "http://inference-gateway.thalamus.svc.cluster.local/v1"
  route:
    enabled: true
    parentRefs:
      - name: inference-gateway
        namespace: thalamus

extraDeploy: []
