apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Release.Namespace }}
spec:
  gatewayClassName: agentgateway
  infrastructure:
    parametersRef:
      group: agentgateway.dev
      kind: AgentgatewayParameters
      name: {{ .Values.gateway.name }}
  listeners:
    {{- toYaml .Values.gateway.listeners | nindent 4 }}
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayParameters
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Release.Namespace }}
spec:
  {{- toYaml .Values.gateway.parameters | nindent 2 }}
{{- range $name, $policy := .Values.gateway.policies }}
{{- if ne $policy.enabled false }}
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
spec:
  targetRefs:
    {{- with $policy.targetRefs }}
    {{- toYaml . | nindent 4 }}
    {{- else }}
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $.Values.gateway.name }}
    {{- end }}
  {{- toYaml (omit $policy "enabled" "targetRefs") | nindent 2 }}
{{- end }}
{{- end }}
