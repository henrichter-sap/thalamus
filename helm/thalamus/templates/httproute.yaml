apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: aggregated-models
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    {{- if .Values.defaultRoute.parentRefs }}
    {{- toYaml .Values.defaultRoute.parentRefs | nindent 4 }}
    {{- else }}
    - name: {{ .Values.gateway.name }}
    {{- end }}
  {{- with .Values.defaultRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: Exact
            value: /v1/models
{{- if .Values.gateway.apiKeyAuth }}
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: apikey-auth-aggregated-models
  namespace: {{ .Release.Namespace }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: aggregated-models
  traffic:
    apiKeyAuthentication:
      mode: Strict
      secretSelector:
        matchLabels:
          thalamus-apikey: "true"
{{- end }}
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: aggregated-models
  namespace: {{ .Release.Namespace }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: aggregated-models
  traffic:
    directResponse:
      status: 200
      body: |
        {
          "object": "list",
          "data": [
            {{- range $i, $m := .Values.models }}
            {
              "id": {{ $m.model | quote }},
              "object": "model",
              "owned_by": {{ $m.model | splitList "/" | first | quote }}
            }{{ if lt (add1 $i) (len $.Values.models) }},{{ end }}
            {{- end }}
          ]
        }
    headerModifiers:
      response:
        set:
          - name: Content-Type
            value: application/json
