{{- if .Capabilities.APIVersions.Has "openstack.stable.sap.cc/v1/OpenstackSeed" }}
apiVersion: openstack.stable.sap.cc/v1
kind: OpenstackSeed
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    ccloud/service: {{ .Values.owner_info.service }}
    ccloud/support-group: {{ .Values.owner_info.support_group }}
  annotations:
    ccloud/support-group-datasource: owner-info
spec:
  domains:
  - name: Default
    users:
    - description: 'This user was automatically generated by a user seed: https://github.com/cobaltcore-dev/thalamus'
      name: {{ required ".Values.seed.user is missing" .Values.seed.user }}
      password: {{ required ".Values.seed.password is missing" .Values.seed.password }}
  - name: ccadmin
    projects:
    - description: 'This project was automatically generated by a project seed: https://github.com/cobaltcore-dev/thalamus'
      name: thalamus
      {{- with .Values.seed.roles }}
      role_assignments:
      {{- range . }}
      - role: {{ . }}
        user: {{ $.Values.seed.user }}@Default
      {{- end }}
      {{- end }}
  requires:
  - monsoon3/keystone-seed
{{- end }}
