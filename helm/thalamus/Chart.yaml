apiVersion: v2
name: thalamus
description: LLM inference workloads chart for Thalamus. Deploys vLLM model servers, the inference gateway, and routing. Requires thalamus-infra to be installed first.
type: application
version: 0.1.0

dependencies:
  - name: open-webui
    repository: https://helm.openwebui.com/
    version: "14.8.0"
    condition: open-webui.enabled
