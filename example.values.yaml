models:
  - slug: qwen3-6-27b
    model: Qwen/Qwen3.6-27B
    accelerator: nvidia
    extraArgs:
      - "--tensor-parallel-size=2"
      - "--reasoning-parser=qwen3"
    resources:
      requests:
        nvidia.com/gpu: "2"
      limits:
        nvidia.com/gpu: "2"

