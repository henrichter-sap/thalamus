name: Docker

"on":
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - '*'
  workflow_dispatch: { }

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build${{ github.event_name == 'pull_request' && '' || ' and push' }}
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for image
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata for debug image
        id: meta-debug
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          bake-target: docker-metadata-action-debug
          flavor: |
            suffix=-debug,onlatest=true
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # Single-platform prebuilds populate per-arch GHA cache scopes.
      # See https://github.com/docker/buildx/discussions/1382
      - name: Prebuild amd64
        uses: docker/bake-action@v7
        with:
          files: ./docker-bake.hcl
          targets: default
          set: |
            *.platform=linux/amd64
            *.output=type=cacheonly
            *.cache-from=type=gha,scope=amd64
            *.cache-to=type=gha,scope=amd64,mode=max

      - name: Prebuild arm64
        uses: docker/bake-action@v7
        with:
          files: ./docker-bake.hcl
          targets: default
          set: |
            *.platform=linux/arm64
            *.output=type=cacheonly
            *.cache-from=type=gha,scope=arm64
            *.cache-to=type=gha,scope=arm64,mode=max

      - name: Build${{ github.event_name == 'pull_request' && '' || ' and push' }} images
        uses: docker/bake-action@v7
        with:
          files: |
            ./docker-bake.hcl
            cwd://${{ steps.meta.outputs.bake-file }}
            cwd://${{ steps.meta-debug.outputs.bake-file }}
          targets: default
          push: ${{ github.event_name != 'pull_request' }}
          set: |
            *.cache-from=type=gha,scope=amd64
            *.cache-from=type=gha,scope=arm64
